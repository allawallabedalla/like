# CI — läuft bei jedem Push auf main UND bei jeder Pull Request.
# Prüft: Syntax aller Server-/Lib-Module, Server-Boot je Pack (Smoke) und die funktionalen
# E2E-Regressionstests (inkl. Drag/Zoom/Pill/LOD). So kann kein kaputter Stand nach main.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Electron-Binary NICHT herunterladen — wir bauen hier keine Desktop-App, das spart Zeit.
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      # Security-Audit (W3): informativ, nicht blockierend. Das Produkt ist zero-dependency;
      # hier geht es um die Build-/Test-devDeps. High/Critical erscheinen im Log, blocken aber
      # keinen Produkt-Merge (Dependabot liefert die eigentlichen Update-PRs).
      - name: Sicherheits-Audit (npm)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Syntax-Check (alle .mjs)
        run: |
          find server.mjs lib packs scripts -name '*.mjs' -print0 \
            | xargs -0 -n1 node --check

      - name: Smoke (Config valide + Server-Boot je Pack)
        run: npm run check

      # Playwright-Browser cachen: der ~150-MB-Chromium-Download vom Playwright-CDN lief bei
      # JEDEM Lauf und stallte gelegentlich bis zum 20-Min-Timeout. Mit Cache (gekeyed auf die
      # installierte Playwright-Version) entfällt der Download bei Cache-Hits komplett.
      - name: Playwright-Version ermitteln
        id: pwver
        run: echo "v=$(node -p "require('./node_modules/@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Playwright-Browser cachen
        id: pwcache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pwver.outputs.v }}

      # Bei Cache-Hit ist Chromium schon da -> playwright install überspringt den Download,
      # nur die System-Deps (apt) laufen kurz. Bei Miss: voller Download, der Cache füllt sich.
      - name: Playwright-Browser (Chromium) installieren
        run: npx playwright install --with-deps chromium

      - name: E2E-Regressionstests
        run: npm run test:ci

      - name: Playwright-Report als Artefakt (bei Fehlern)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
