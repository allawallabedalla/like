name: Build & Release

# Baut die Desktop-Download(s) (Windows + macOS) — EINE App, die alle Domänen bündelt
# (in der App wird oben zwischen Musik, Büchern, Filmen … umgeschaltet).
#
# Auslöser:
#   - Tag-Push "v*"                    -> baut + erstellt Release
#   - workflow_dispatch (Run workflow) -> Test-Build (Artefakte); mit Tag-Input auch Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release-Tag (z.B. v2.0.0) — leer lassen für reinen Test-Build"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  # Vorab-Gate: electron-builder-Config validieren + alle Packs boot-testen.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check

  build:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: "dist:mac"
            pattern: "dist/*.dmg"
          - os: windows-latest
            script: "dist:win"
            pattern: "dist/*.exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      # Eingebettete Keys aus Repo-Secrets in die jeweiligen Dateien schreiben, damit die
      # gebaute App out-of-the-box funktioniert. Fehlt ein Secret, wird ohne diesen Key
      # gebaut (das betroffene Pack läuft dann ohne eingebetteten Key / Feedback ist aus).
      - name: Keys einbetten
        shell: bash
        env:
          LASTFM_KEY: ${{ secrets.LASTFM_KEY }}
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
          TASTEDIVE_KEY: ${{ secrets.TASTEDIVE_KEY }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        run: |
          [ -n "$LASTFM_KEY" ] && printf '%s' "$LASTFM_KEY" > .lastfm-key || true
          [ -n "$TMDB_KEY" ] && printf '%s' "$TMDB_KEY" > .tmdb-key || true
          [ -n "$TASTEDIVE_KEY" ] && printf '%s' "$TASTEDIVE_KEY" > .tastedive-key || true
          if [ -n "$PUSHOVER_TOKEN" ] && [ -n "$PUSHOVER_USER" ]; then
            printf '{"token":"%s","user":"%s"}' "$PUSHOVER_TOKEN" "$PUSHOVER_USER" > .pushover
          fi
          echo "Keys (soweit als Secret vorhanden) eingebettet."

      - run: npm ci

      - name: Build
        run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # macOS ad-hoc-signiert via scripts/afterSign.js

      - name: Prüfsummen (SHA256)
        shell: bash
        run: |
          cd dist
          shopt -s nullglob
          for f in *.exe *.dmg; do
            node -e "const c=require('crypto'),fs=require('fs'),f=process.argv[1];console.log(c.createHash('sha256').update(fs.readFileSync(f)).digest('hex')+'  '+f)" "$f" | tee "$f.sha256"
          done

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v7
        with:
          name: like-${{ matrix.os }}
          path: |
            ${{ matrix.pattern }}
            dist/*.sha256
          if-no-files-found: error

      - name: An Release anhängen
        if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
          files: |
            ${{ matrix.pattern }}
            dist/*.sha256
          fail_on_unmatched_files: true
