name: Build & Release

# Baut die Downloads auf echten Windows- + macOS-Runnern und hängt sie an ein
# GitHub-Release. Auslöser: ein Tag-Push wie "v1.2.0" ODER "Run workflow" mit
# ausgefülltem Tag-Feld (erstellt den Tag serverseitig gleich mit). "Run workflow"
# ohne Tag = reiner Test-Build (Dateien nur als Artefakte, kein Release).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release-Tag (z.B. v1.2.0) — leer lassen für reinen Test-Build"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: "dist:mac"
            pattern: "dist/*.dmg"
          - os: windows-latest
            script: "dist:win"
            pattern: "dist/*.exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Last.fm-Key aus dem Repo-Secret in .lastfm-key schreiben, damit die
      # gebauten Apps out-of-the-box suchen können. Fehlt das Secret, wird die
      # App trotzdem gebaut (Nutzer bringt dann eigenen Key mit).
      - name: Last.fm-Key einbetten
        shell: bash
        env:
          LASTFM_KEY: ${{ secrets.LASTFM_KEY }}
        run: |
          if [ -n "$LASTFM_KEY" ]; then
            printf '%s' "$LASTFM_KEY" > .lastfm-key
            echo "Key eingebettet."
          else
            echo "Kein LASTFM_KEY-Secret gesetzt — App wird ohne eingebetteten Key gebaut."
          fi

      - run: npm ci

      - name: Build
        run: npm run ${{ matrix.script }}
        env:
          # macOS ad-hoc-signiert via scripts/afterSign.js — electron-builders
          # eigene Signatursuche (Developer-ID) hier abschalten.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # SHA256-Prüfsummen zum Verifizieren. Über Node berechnet — plattformneutral
      # (shasum fehlt im Windows-Git-Bash, sha256sum auf macOS; Node läuft überall).
      - name: Prüfsummen (SHA256)
        shell: bash
        run: |
          cd dist
          shopt -s nullglob
          for f in *.exe *.dmg; do
            node -e "const c=require('crypto'),fs=require('fs'),f=process.argv[1];console.log(c.createHash('sha256').update(fs.readFileSync(f)).digest('hex')+'  '+f)" "$f" | tee "$f.sha256"
          done

      # Immer als Build-Artefakt ablegen (auch bei manuellem Lauf ohne Tag).
      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: like-${{ matrix.os }}
          path: |
            ${{ matrix.pattern }}
            dist/*.sha256
          if-no-files-found: error

      # Bei Tag-Push ODER manuellem Lauf mit Tag-Input: Release erstellen/befüllen.
      # Beim manuellen Lauf legt die Action den Tag serverseitig an (auf dem
      # gebauten Commit) — lokales Taggen/Pushen ist nicht nötig.
      - name: An Release anhängen
        if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
          files: |
            ${{ matrix.pattern }}
            dist/*.sha256
          fail_on_unmatched_files: true
