# Dependabot (W3): hält devDependencies und die GitHub-Actions aktuell. Das Produkt selbst
# ist zero-dependency (nur Node-Builtins) — hier geht es um die Build-/Test-Kette (Playwright,
# electron-builder, ajv) und die Action-Versionen. Wöchentlich, gedeckelt, damit es nicht spammt.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["ci"]
    commit-message:
      prefix: "ci"
