# render.yaml — 1-Klick-Deploy auf Render (https://render.com) als „Blueprint".
# Anleitung: Repo bei Render verbinden → „New +" → „Blueprint" → dieses Repo wählen.
# Render liest diese Datei, baut das Dockerfile und startet den Server öffentlich per HTTPS.
# Danach: die vergebene URL in Safari öffnen → „Teilen → Zum Home-Bildschirm" = iPhone-App.

# Pull-Request-Previews: Für JEDE offene PR baut Render automatisch eine eigene, temporäre
# Instanz mit eigener URL (z. B. like-pr-42.onrender.com). Dort visuell abnehmen, DANN erst
# die PR nach main mergen (= Produktions-Deploy). Läuft nur nach der eigentlichen main-Instanz
# hoch. Previews räumen sich nach ein paar Tagen ohne neue Commits selbst auf.
# Hinweis: Jede Preview ist eine eigene (pro-rata berechnete) Instanz — bei Bedarf im Render-
# Dashboard unter Settings → Pull Request Previews abschaltbar.
previews:
  generation: automatic
  expireAfterDays: 5

services:
  - type: web
    name: like
    runtime: docker
    plan: starter         # Instance-Type „Starter" (~7 $/Mon): immer wach, persistente Platte. (Free erlaubt keine Disk.)
    healthCheckPath: /api/packs
    envVars:
      - key: HOST
        value: 0.0.0.0        # öffentlich lauschen, damit Render den Container erreicht
      - key: LIKE_DATA_DIR
        value: /data
      # „Coming soon"-Gate: gesetzt = nur das öffentliche Pack (Default: music) ist frei,
      # alle anderen brauchen dieses Passwort. Leer/ungesetzt = alles offen.
      - key: LIKE_UNLOCK_PASSWORD
        sync: false
      # Optionale Heimat für „Like Travel" (Standard: Berlin, Deutschland)
      - key: LIKE_TRAVEL_HOME
        sync: false
      # Spenden (freiwillig): PayPal.me-Link setzen -> alle 10 Nutzungs-Minuten ein
      # wegdrückbares Spenden-Popup; nach Klick auf „Spenden" 72 Std Ruhe.
      # Ungesetzt = aus (lokal/Desktop/Tests unverändert).
      - key: LIKE_DONATE_URL
        sync: false
      # Keys für die Key-Packs — im Render-Dashboard eintragen (nicht ins Repo!).
      # Die key-losen Packs (Reisen, Wikipedia-Universal, Pflanzen, Bücher, Paper,
      # Brettspiele, Podcasts, Indie-Games) laufen auch ganz ohne.
      - key: LASTFM_API_KEY    # Like Music
        sync: false
      - key: TMDB_API_KEY      # Like Movies
        sync: false
      - key: TASTEDIVE_KEY     # optional: „mochten auch" für Bücher/Podcasts/Games
        sync: false
      - key: PUSHOVER_TOKEN    # optional: Feedback-Knopf + Push bei jeder Neu-Registrierung + RA-Störungs-Alarm
        sync: false
      - key: PUSHOVER_USER
        sync: false
      # optional: anonymes Feedback zusätzlich dauerhaft als GitHub-Issue sammeln (Label "feedback"),
      # damit daraus Backlog-Einträge werden. Token braucht nur "issues: write" aufs Repo — Fine-grained
      # PAT reicht. Ungesetzt = aus (dann bleibt es bei der Pushover-Sofortmeldung). Nie ins Repo!
      - key: GITHUB_FEEDBACK_TOKEN
        sync: false
      - key: GITHUB_FEEDBACK_REPO   # "owner/repo"; leer = Default allawallabedalla/like
        sync: false
      # optional: Betreiber-Geheimnis. Schaltet den „neuer Besuch"-Push frei UND den
      # geschützten Lese-Endpunkt GET /api/feedback/log?secret=… (zeigt die gesammelten
      # Feedback-Issues in der App/per curl). Ungesetzt = beides aus.
      - key: LIKE_OWNER_SECRET
        sync: false
      # Zweitquelle für „zusammen aufgetreten" (Setlist.fm, Gratis-Key) — zweites Standbein
      # neben der inoffiziellen RA-API; ohne Key ist das Feature einfach aus.
      - key: SETLISTFM_KEY
        sync: false
    # Persistente Platte, damit gebaute Karten einen Neustart überleben.
    # (Braucht einen bezahlten Instance-Type wie „starter" — auf „free" sind keine Disks erlaubt.)
    disk:
      name: like-data
      mountPath: /data
      sizeGB: 1
